<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Picking Almacén</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
 --primary:#0d6efd;
 --success:#198754;
 --danger:#dc3545;
}
body{background:#eef2f7;}
body.dark{background:#121417;color:#eee;}
.header{background:linear-gradient(135deg,#0d6efd,#084298);color:#fff;padding:12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.card-main{max-width:1100px;margin:auto;margin-top:15px;border-radius:20px;overflow:hidden;}
.quantity{font-size:5rem;font-weight:900;text-align:center;}
.barcode{font-family:monospace;font-size:1.5rem;font-weight:bold;text-align:center;}
.qty-btn{height:65px;font-size:1.3rem;font-weight:bold;}
.accept-btn{height:80px;font-size:1.6rem;font-weight:bold;}
#reader{min-height:400px;width:80%;margin: 0 auto;}
.product-img{max-height:180px;object-fit:contain;}
#okPanel{display:none;}
</style>
</head>
<body>



<div class="container-fluid py-3">

<!--div class="card card-main shadow"-->
<div class="card-body">

<div class="d-flex flex-wrap gap-2 justify-content-center mb-3">
<button id="entradaBtn" class="btn btn-success btn-lg">ENTRADA</button>
<button id="salidaBtn" class="btn btn-outline-danger btn-lg">SALIDA</button>

<div class="form-check form-switch ms-3">
<input class="form-check-input" type="checkbox" id="continuousMode">
<label class="form-check-label">Lectura continua</label>
</div>

<div class="form-check form-switch">
<input class="form-check-input" type="checkbox" id="darkMode">
<label class="form-check-label">Tema oscuro</label>
</div>
</div>

<div id = "bloque_lectura">
    
    
    <div id="reader"></div>
    
    <hr>
    
    <div id="barcode" class="barcode">Esperando lectura...</div>

</div>

<div id="bloque_proceso">
    
    <div class="card bg-light mt-3">
        <div class="card-body">
        <div class="row">
        <div class="col-md-3 text-center">
        <img id="imgProducto" class="img-fluid rounded product-img" src="https://via.placeholder.com/200x200?text=Producto">
        </div>
        <div class="col-md-9">
        <h3 id="descripcionProducto">Sin producto</h3>
        <div class="row">
        <div class="col-md-4"><strong>Stock</strong><div id="stockProducto">-</div></div>
        <div class="col-md-4"><strong>Ubicación</strong><div id="ubicacionProducto">-</div></div>
        <div class="col-md-4"><strong>Código</strong><div id="codigoProducto">-</div></div>
        </div>
        </div>
        </div>
        </div>
    </div>
    
    
    <div id="quantity" class="quantity">0</div>
    
    <div class="row g-2">
        
        <div class="col"><button class="btn btn-danger w-100 qty-btn minus" data-value="20">-20</button></div>
        <div class="col"><button class="btn btn-danger w-100 qty-btn minus" data-value="10">-10</button></div>
        <div class="col"><button class="btn btn-danger w-100 qty-btn minus" data-value="5">-5</button></div>
        <div class="col"><button class="btn btn-danger w-100 qty-btn minus" data-value="1">-1</button></div>
    </div>

    <div class="row g-2 mt-1">
        <div class="col"><button class="btn btn-success w-100 qty-btn plus" data-value="1">+1</button></div>
        <div class="col"><button class="btn btn-success w-100 qty-btn plus" data-value="2">+2</button></div>
        <div class="col"><button class="btn btn-success w-100 qty-btn plus" data-value="5">+5</button></div>
        <div class="col"><button class="btn btn-success w-100 qty-btn plus" data-value="10">+10</button></div>
        <div class="col"><button class="btn btn-success w-100 qty-btn plus" data-value="20">+20</button></div>
    
    </div>
    
    <div class="row g-2  mt-1">
        <div class="col"><button id="cancelBtn" class="btn btn-danger accept-btn w-100">CANCELAR</button></div>
        <div class="col"><button id="acceptBtn" class="btn btn-success accept-btn w-100">ACEPTAR</button></div>
        
    </div>

</div>

<div id="okPanel" class="alert alert-success text-center fs-3">
MOVIMIENTO REGISTRADO
</div>

<div class="card mt-4">
    <div class="card-header">Últimos movimientos</div>
        <div class="card-body">
            <table class="table table-sm">
            <thead>
            <tr><th>Hora</th><th>Código</th><th>Tipo</th><th>Cantidad</th></tr>
            </thead>
            <tbody id="historial"></tbody>
            </table>
        </div>
    </div>

</div>
<!--/div-->
</div>

<script>
let currentMode='entrada';
let currentBarcode=null;
let quantity=0;
let scanner=null;
let scannerRunning=false;

const barcodeLabel=document.getElementById('barcode');
const quantityLabel=document.getElementById('quantity');
const bloque_lectura = document.getElementById('bloque_lectura');
const bloque_proceso = document.getElementById('bloque_proceso');



entradaBtn.onclick=()=>{
 currentMode='entrada';
 entradaBtn.className='btn btn-success btn-lg';
 salidaBtn.className='btn btn-outline-danger btn-lg';
};

salidaBtn.onclick=()=>{
 currentMode='salida';
 entradaBtn.className='btn btn-outline-success btn-lg';
 salidaBtn.className='btn btn-danger btn-lg';
};

darkMode.onchange=()=>{
 document.body.classList.toggle('dark',darkMode.checked);
};

document.querySelectorAll('.plus').forEach(b=>{
 b.onclick=()=>{
  if(!currentBarcode) return;
  quantity+=parseInt(b.dataset.value);
  quantityLabel.textContent=quantity;
 };
});

document.querySelectorAll('.minus').forEach(b=>{
 b.onclick=()=>{
  if(!currentBarcode) return;
  quantity=Math.max(0,quantity-parseInt(b.dataset.value));
  quantityLabel.textContent=quantity;
 };
});

function beep(){
 try{
   new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
 }catch(e){}
}

function vibrate(){
 if(navigator.vibrate) navigator.vibrate(150);
}

async function startScanner(){
 bloque_proceso.style.display = "none";
 bloque_lectura.style.display = "block";
 if(scannerRunning) return;
 scanner=new Html5Qrcode("reader");
 await scanner.start(
 {facingMode:"environment"},
 {fps:20, qrbox: 250},
 onBarcodeRead
 );
 scannerRunning=true;

}

async function stopScanner(){
 if(!scannerRunning) return;
 await scanner.stop();
 await scanner.clear();
 scannerRunning=false;
  bloque_proceso.style.display = "block";
 bloque_lectura.style.display = "none";
}

async function onBarcodeRead(code){
 currentBarcode=code;
 barcodeLabel.textContent=code;
 quantity=1;
 quantityLabel.textContent='1';

 beep();
 vibrate();

 await stopScanner();

 const p=await obtenerProducto(code);

 descripcionProducto.textContent=p.descripcion || '-';
 stockProducto.textContent=p.stock || '-';
 ubicacionProducto.textContent=p.ubicacion || '-';
 codigoProducto.textContent=code;
 imgProducto.src=p.imagen || 'https://via.placeholder.com/200x200?text=Producto';
}

/* IMPLEMENTAR */
async function obtenerProducto(codigo){
 return {
   descripcion:'Producto leído',
   stock:'-',
   ubicacion:'-',
   imagen:'https://via.placeholder.com/200x200?text='+encodeURIComponent(codigo)
 };
}

/* IMPLEMENTAR */
async function procesarMovimiento(codigo,cantidad,tipo){
 // Tu llamada AJAX/PHP aquí
}

function agregarHistorial(codigo,cantidad,tipo){
 const tr=document.createElement('tr');
 tr.innerHTML=`
 <td>${new Date().toLocaleTimeString()}</td>
 <td>${codigo}</td>
 <td>${tipo}</td>
 <td>${cantidad}</td>`;
 historial.prepend(tr);
 if(historial.children.length>20){
   historial.removeChild(historial.lastChild);
 }
}

function mostrarOK(){
 okPanel.style.display='block';
 setTimeout(()=>okPanel.style.display='none',1500);
}

cancelBtn.onclick = async()=>{

 currentBarcode=null;
 quantity=0;

 barcodeLabel.textContent='Esperando lectura...';
 quantityLabel.textContent='0';

 descripcionProducto.textContent='Sin producto';
 stockProducto.textContent='-';
 ubicacionProducto.textContent='-';
 codigoProducto.textContent='-';

 if(continuousMode.checked){
   await startScanner();
 }else{
   await startScanner();
 }

};

acceptBtn.onclick=async()=>{

 if(!currentBarcode){
   alert('Debe leer un código');
   return;
 }

 if(quantity<=0){
   alert('Debe indicar una cantidad');
   return;
 }

 await procesarMovimiento(
   currentBarcode,
   quantity,
   currentMode
 );

 agregarHistorial(
   currentBarcode,
   quantity,
   currentMode
 );

 mostrarOK();

 currentBarcode=null;
 quantity=0;

 barcodeLabel.textContent='Esperando lectura...';
 quantityLabel.textContent='0';

 descripcionProducto.textContent='Sin producto';
 stockProducto.textContent='-';
 ubicacionProducto.textContent='-';
 codigoProducto.textContent='-';

 if(continuousMode.checked){
   await startScanner();
 }else{
   await startScanner();
 }
};

startScanner();
</script>

</body>
</html>
