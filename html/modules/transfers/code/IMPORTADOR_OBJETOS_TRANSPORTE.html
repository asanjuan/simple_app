<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Selección de registros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">


        <div class="card-body">

            <div class="row g-3 align-items-end">

                <div class="col-md-2">
                    <label class="form-label">Tabla</label>
                    <select id="tabla" class="form-select">
                        <option value="">Seleccione...</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Filtro</label>
                    <input
                        type="text"
                        id="filtro"
                        class="form-control"
                        placeholder="Escriba un filtro">
                </div>

                <div class="col-md-2">
                    <div class="form-check mb-2">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="dependientes">

                        <label class="form-check-label" for="dependientes">
                            Dependientes
                        </label>
                    </div>
                </div>

                <div class="col-md-2 d-grid">
                    <button class="btn btn-primary" onclick="buscar()">
                        Buscar
                    </button>
                </div>
                <div class="col-md-2 d-grid">

                    <button
                        class="btn btn-success"
                        onclick="procesarSeleccionados()">
                        Aceptar
                    </button>
        
                </div>

            </div>

            <hr>

            <div class="table-responsive">

                <table class="table table-hover table-sm align-middle">

                    <thead class="table-light">

                    <tr>
                        <th style="width:40px;">
                            <input type="checkbox" id="seleccionarTodo">
                        </th>
                       
                        <th>Descripción</th>
                    </tr>

                    </thead>

                    <tbody id="resultado">
                        <!-- Resultados -->
                    </tbody>

                </table>

            </div>

        </div>

       


</div>

<script>

document.addEventListener("DOMContentLoaded", onload);
let myapp = parent.MyApp;
let entidades = null;

const optionentidades = document.getElementById("tabla");

//LOAD DEL FORMULARIO
function onload(){
    
    debugger;
    loadEntities();

}

//carga del option de entidades
function loadEntities(){
    debugger;
    var query = `{
        "select": [
            "entity",
            "campo_principal",
            "plural_name"
        ],
        "from": {
            "table": "app_entities",
            "alias": ""
        },
        "joins": [],
        "where": "entity in ('app_modules', 'app_entities', 'app_dominios', 'app_plugin_library')",
        "groupBy": [],
        "having": "",
        "orderBy": [
            "plural_name"
        ],
        "limit": null,
        "distinct": false
    }`;
    myapp.api.query(query).then( data => {
        
        entidades = data;
        
        for (const item of data) {
            const option = document.createElement("option");
            option.value = item.entity;
            option.textContent = item.plural_name;
            optionentidades.appendChild(option);
        }
    });
    
    
}

function lookupentity(entidad){
    for (const item of entidades) {
        if (item.entity == entidad){
            return item;
        }
    }
    return null;
}

function buscar() {

    // ==========================================
    // IMPLEMENTAR AQUÍ
    //
    // Leer:
    //  - tabla
    //  - filtro
    //  - dependientes
    //
    // Consultar la base de datos.
    // Finalmente llamar a:
    //
    // mostrarResultados(registros);
    //
    // ==========================================
    if (optionentidades.value == "") return;
    debugger;
    
    
    let filtrotxt = filtro.value;
    let entidad = optionentidades.value;
    let objentity = lookupentity(entidad);
    
    let campo_principal = objentity.campo_principal;
    
    var query = `{
        "select": [
            "*"
        ],
        "from": {
            "table": "${entidad}",
            "alias": ""
        },
        "joins": [],
        "where": "${campo_principal} like '%${filtrotxt}%'",
        "groupBy": [],
        "having": "",
        "orderBy": [],
        "limit": 100,
        "distinct": false
    }`;
    
    const tbody = document.getElementById("resultado");

    tbody.innerHTML = "";
    
    
    myapp.api.query(query).then( data => {
        
        mostrarResultados(data,campo_principal);
    });
}


function mostrarResultados(registros, campo_principal) {
    const tbody = document.getElementById("resultado");

    registros.forEach(r => {

        tbody.insertAdjacentHTML("beforeend", `
            <tr>
                <td>
                    <input
                        type="checkbox"
                        class="registro"
                        value="${r.id}">
                </td>
                
                <td>${r[campo_principal]}</td>
            </tr>
        `);

    });

}


document.getElementById("seleccionarTodo").addEventListener("change", function () {

    document.querySelectorAll(".registro").forEach(c => {
        c.checked = this.checked;
    });

});


function procesarSeleccionados() {

    const seleccionados = [];

    document.querySelectorAll(".registro:checked").forEach(c => {
        seleccionados.push(c.value);
    });

    // ==========================================
    // IMPLEMENTAR AQUÍ
    //
    // "seleccionados" contiene los IDs elegidos.
    //
    // ==========================================

}

</script>

</body>
</html>
